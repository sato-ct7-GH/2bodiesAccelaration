<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糸でつながれた2物体の運動 学習クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" onload="appInit()"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#edf2f7;color:#1a202c;min-height:100vh;}

header{background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 100%);color:#fff;padding:14px 18px 12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.hdr-school{font-size:11px;opacity:.75;margin-bottom:4px;letter-spacing:.5px;}
.hdr-title{font-size:18px;font-weight:700;letter-spacing:.5px;}
.hdr-sub{font-size:12px;opacity:.8;margin-top:4px;min-height:1em;}

.tabs{display:flex;background:#1e3a8a;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{flex:1;min-width:76px;padding:10px 4px;text-align:center;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;user-select:none;white-space:nowrap;}
.tab.active{color:#fbbf24;border-bottom-color:#fbbf24;}

.main{max-width:680px;margin:0 auto;padding:14px 13px 70px;}

.mode-row{display:flex;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:14px;}
.mode-btn{flex:1;padding:11px 6px;border:none;background:#fff;color:#6b7280;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;}
.mode-btn.active{background:#2563eb;color:#fff;}

/* ── アニメーション ── */
.anim-wrap{background:#fff;border-radius:12px;padding:10px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.09);}
.btn-row{display:flex;gap:8px;justify-content:center;margin-top:8px;flex-wrap:wrap;}
.btn-primary{padding:7px 20px;font-size:13px;font-weight:700;border-radius:6px;cursor:pointer;border:none;font-family:inherit;background:#2563eb;color:#fff;}
.btn-primary:disabled{background:#93c5fd;cursor:not-allowed;}
.btn-secondary{padding:7px 18px;font-size:13px;font-weight:700;border-radius:6px;cursor:pointer;font-family:inherit;background:#fff;color:#475569;border:1.5px solid #cbd5e1;}
.btn-new{padding:7px 18px;font-size:13px;font-weight:700;border-radius:6px;cursor:pointer;font-family:inherit;background:#059669;color:#fff;border:none;}
.done-banner{display:none;padding:6px 12px;border-radius:6px;text-align:center;font-size:12px;margin-top:6px;background:#f0f9ff;border:1px solid #7dd3fc;color:#0c4a6e;}

/* ── 進捗・スコア ── */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.prog-bar{flex:1;height:5px;background:#cbd5e1;border-radius:3px;}
.prog-fill{height:100%;background:#2563eb;border-radius:3px;transition:width .35s ease;}
.prog-text{font-size:12px;color:#64748b;white-space:nowrap;}
.score-row{text-align:right;font-size:13px;color:#64748b;margin-bottom:12px;}

.setup{font-size:13.5px;line-height:1.85;background:#eff6ff;border:1px solid #dbeafe;border-radius:10px;padding:12px 16px;margin-bottom:12px;}

.q-card{background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.09);border-left:4px solid #2563eb;}
.q-num{font-size:11px;font-weight:700;color:#2563eb;margin-bottom:7px;letter-spacing:.5px;}
.q-text{font-size:14.5px;line-height:1.8;}

.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.choice-btn{width:100%;padding:12px 16px;background:#fff;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:14px;text-align:left;color:#374151;transition:all .15s;font-family:inherit;line-height:1.6;}
.choice-btn:hover:not(:disabled){border-color:#93c5fd;background:#eff6ff;}
.choice-btn.correct{border-color:#34d399;background:#ecfdf5;color:#065f46;font-weight:600;}
.choice-btn.wrong{border-color:#f87171;background:#fef2f2;color:#991b1b;}
.choice-btn:disabled{cursor:default;}

.feedback{padding:12px 16px;border-radius:8px;font-size:13px;line-height:1.65;display:none;margin-bottom:12px;}
.feedback.ok{display:block;background:#ecfdf5;border:1px solid #6ee7b7;color:#065f46;}
.feedback.ng{display:block;background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;}
.fb-expl{display:block;margin-top:8px;font-weight:400;color:#78350f;}
.fb-expl .eq{text-align:center;margin:4px 0;}

.next-btn{width:100%;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.next-btn:hover{background:#1e3a8a;}

.intro-answer{background:#ecfdf5;border:1px solid #6ee7b7;border-radius:10px;padding:14px 18px;margin-bottom:14px;}
.intro-answer-label{font-size:11px;font-weight:700;color:#059669;letter-spacing:.5px;margin-bottom:6px;}
.intro-answer-text{font-size:15px;font-weight:700;color:#065f46;margin-bottom:10px;line-height:1.6;}
.intro-expl{font-size:13px;line-height:1.8;color:#374151;border-top:1px dashed #a7f3d0;padding-top:10px;}
.intro-expl .eq{text-align:center;margin:4px 0;}

.result-card,.sm-final-card,.done-card,.coming-card{background:#fff;border-radius:16px;padding:36px 24px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.result-emoji,.sm-final-icon,.done-icon,.coming-icon{font-size:52px;margin-bottom:12px;}
.result-score{font-size:52px;font-weight:800;color:#2563eb;line-height:1;}
.result-total{font-size:16px;color:#64748b;margin-bottom:6px;}
.result-pct{font-size:26px;font-weight:700;color:#374151;margin-bottom:24px;}
.retry-btn{padding:12px 34px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.result-actions{display:flex;flex-direction:column;gap:10px;}

.name-card{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:13px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.name-label{font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;display:block;}
.name-input{width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:15px;font-family:inherit;outline:none;color:#1a202c;}
.name-input:focus{border-color:#2563eb;}

.sub-result{padding:16px;border-radius:10px;text-align:center;margin-bottom:16px;font-size:14px;line-height:1.8;}
.sub-result.ok{background:#ecfdf5;border:1px solid #6ee7b7;color:#065f46;}
.sub-result.warn{background:#fffbeb;border:1px solid #fcd34d;color:#92400e;}

.sm-explanation{display:flex;gap:10px;align-items:flex-start;background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.7;color:#78350f;margin-bottom:12px;}
.sm-explanation .eq{text-align:center;margin:4px 0;}
.sm-expl-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.sm-final-title{font-size:16px;font-weight:700;color:#1a202c;margin-bottom:6px;}
.sm-final-name{font-size:14px;color:#2563eb;font-weight:600;margin-bottom:20px;}
.sm-start-btn{width:100%;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.sm-start-btn:hover{background:#1e3a8a;}
.submit-btn{width:100%;padding:14px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:14px;}
.submit-btn:hover{background:#047857;}
.submit-btn:disabled{background:#9ca3af;cursor:not-allowed;}

.done-title{font-size:17px;font-weight:700;color:#1a202c;margin-bottom:6px;}
.done-sub{font-size:13px;color:#64748b;margin-bottom:22px;}
.done-actions{display:flex;flex-direction:column;gap:10px;}

.order-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.order-label{font-size:12px;color:#64748b;margin-right:2px;white-space:nowrap;}
.order-btn{padding:5px 14px;border-radius:20px;border:1.5px solid #cbd5e1;background:#fff;color:#64748b;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.order-btn.active{background:#2563eb;border-color:#2563eb;color:#fff;}

.katex{font-size:1em;}
.katex-display{margin:.3em 0;}
</style>
</head>

<div class="main">

      <defs>

      </defs>
      <rect width="560" height="248" fill="#dbeafe"/>
      <rect y="248" width="560" height="242" fill="#f1f5f9"/>

      <text id="blb" x="95" y="214" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="'Noto Sans JP',sans-serif">m</text>
      <line id="bta" x1="130" y1="204" x2="148" y2="204" stroke="#dc2626" stroke-width="2.5" marker-end="url(#mR)"/>

<script>
// ============================================================
// 物理エンジン（数式・選択肢の生成）
// ============================================================
var G = 9.8, MU_ANIM = 0.3;
var PAIRS3 = [[1,6],[1,13],[2,12],[3,11],[4,10],[5,9]];
var PAIRS3F = [[1,2.5,0.5,2],[1,1.8,0.8,1],[2,1.5,0.5,0.5],[2,3.6,0.8,2],[3,2.6,0.2,2],[3,1.9,0.3,1],[4,3,0.5,1],[5,2,0.2,1],[5,2,0.3,0.5],[6,3.8,0.3,2],[8,1.8,0.1,1],[8,6,0.5,2]];

function k(tex){ return (typeof katex !== 'undefined') ? katex.renderToString(tex,{throwOnError:false}) : tex; }
function eq(tex,label){ return '<div class="eq">'+k('\\displaystyle '+tex)+(label?'<span class="eqno">　…'+label+'</span>':'')+'</div>'; }
function gcd(a,b){ return b?gcd(b,a%b):a; }
function cm(n){ return (n===1?'':n)+'m'; }
function cmu(n){ return (n===1?'':n)+'\\mu mg'; }
function muT(n){ return (n===1?'':n)+'\\mu'; }
function f1(n){ return n.toFixed(1); }
function fm(v){ return String(parseFloat(v.toFixed(2))); }
function fracU(n,d,unit){ var g=gcd(n,d); n/=g; d/=g; return d===1 ? (n===1?'':n)+unit : '\\frac{'+n+'}{'+d+'}\\,'+unit; }
function fracMuG(A,B,D,sign){ var d=gcd(gcd(A,B),D); A/=d;B/=d;D/=d; var num=A+' '+sign+' '+muT(B); var tex=(D===1)?'\\left('+num+'\\right)g':'\\frac{'+num+'}{'+D+'}\\,g'; return {tex:tex,key:A+sign+B+'/'+D}; }
function fracOneMu(n,d,sign){ var g=gcd(n,d); n/=g; d/=g; var core='(1 '+sign+' \\mu)'; return d===1 ? (n===1?core:n+core)+'\\,mg' : '\\frac{'+n+core+'}{'+d+'}\\,mg'; }
function rnd(mi,ma){ return mi+Math.floor(Math.random()*(ma-mi+1)); }
function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t;} return a; }
function pick3Fracs(correct,cands){ var used=[correct[0]/correct[1]]; var out=[]; for(var i=0;i<cands.length&&out.length<3;i++){ var v=cands[i][0]/cands[i][1]; if(!used.some(function(u){return Math.abs(u-v)<1e-9;})){ out.push(cands[i]); used.push(v);} } return out; }
function pick3Keys(correctKey,cands){ var used=[correctKey]; var out=[]; for(var i=0;i<cands.length&&out.length<3;i++){ if(used.indexOf(cands[i].key)===-1){ out.push(cands[i]); used.push(cands[i].key);} } return out; }

// セクション定義：1〜3=摩擦なしモード1〜3　4〜6=摩擦ありモード1〜3
var SECDEFS = [
  {id:1, label:'摩擦なし①', fric:false, sub:1, subtitle:'文字計算①（摩擦なし・m,M固定）'},
  {id:2, label:'摩擦なし②', fric:false, sub:2, subtitle:'文字計算②（摩擦なし・質量ランダム）'},
  {id:3, label:'摩擦なし③', fric:false, sub:3, subtitle:'数値計算（摩擦なし）'},
  {id:4, label:'摩擦あり①', fric:true,  sub:1, subtitle:'文字計算①（摩擦あり・m,M,μ固定）'},
  {id:5, label:'摩擦あり②', fric:true,  sub:2, subtitle:'文字計算②（摩擦あり・質量ランダム）'},
  {id:6, label:'摩擦あり③', fric:true,  sub:3, subtitle:'数値計算（摩擦あり）'}
];

// ランダム部分の質量・μパラメータを新規生成
function newParams(fric, sub){
  if (sub === 2) return { p: rnd(1,5), q: rnd(2,10) };
  if (sub === 3) {
    if (fric) { var pk = PAIRS3F[Math.floor(Math.random()*PAIRS3F.length)]; return { X:pk[0], Y:pk[1], mu:pk[2], k:pk[3] }; }
    var pk2 = PAIRS3[Math.floor(Math.random()*PAIRS3.length)]; return { X:pk2[0], Y:pk2[1] };
  }
  return {};
}

// 4問（setup, questions[{text,choices(4,idx0が正解),explanation}], figure）を構築
function buildQuestions(fric, sub, prm) {
  var leadS = '図のように、滑らかな水平面上に置いた物体と、滑車にかけた軽い糸でつながれたおもりがあり、静かにはなすと物体とおもりは動き始めた。糸の張力の大きさを '+k('T')+' とする。';
  var leadR = '図のように、粗い水平面上に置いた物体と、滑車にかけた軽い糸でつながれたおもりがあり、静かにはなすと物体とおもりは動き始めた。糸の張力の大きさを '+k('T')+' とする。';
  var setup, q3t, q4t, a1, a2, a3, a4, c1, c2, c3, c4, fig;

  if (!fric && sub === 1) {

  $('wgl').setAttribute('y',ge-4); $('wgl').setAttribute('visibility',gVis);
  $('blk').setAttribute('x',bL); $('bsh').setAttribute('x',bL+5); $('blb').setAttribute('x',bL+BW/2);
  $('bta').setAttribute('x1',bR+2); $('bta').setAttribute('x2',bR+2+tLen); $('btl').setAttribute('x',bR+5+tLen);
  var fVis = fric ? 'visible':'hidden';
  $('ffa').setAttribute('x1',bL-2); $('ffa').setAttribute('x2',bL-2-fLen); $('ffa').setAttribute('visibility',fVis);
  $('ffl').setAttribute('x',bL-6-fLen); $('ffl').setAttribute('visibility',fVis);
  var aLen=Math.max(12,Math.min(68,acc*7));
  $('aa').setAttribute('x1',bL+2); $('aa').setAttribute('x2',bL+2+aLen); $('al').setAttribute('x',bL+aLen+8);
}
function stopAnim(){ if(rf){cancelAnimationFrame(rf);rf=null;} kf(); kf=function(){}; }
function sReset(){ stopAnim(); phase='idle'; $('btn-play').disabled=false; $('done').style.display='none'; draw(0); }
function sPlay(){
  stopAnim(); phase='running'; $('btn-play').disabled=true; $('done').style.display='none';
  var acc=(curFig.m2a-curFig.muA*curFig.m1a)*G/(curFig.m1a+curFig.m2a);
  var t0=null, alive=true; kf=function(){alive=false;};
  var step=function(ts){
    if(!alive) return;
    if(t0===null) t0=ts;
    var t=(ts-t0)/1000*SLOW, d=0.5*acc*t*t;
    if(d>=MM){ alive=false; phase='done'; $('btn-play').disabled=false; draw(MM); $('done').style.display='block'; return; }
    draw(d); rf=requestAnimationFrame(step);
  };
  rf=requestAnimationFrame(step);
}

// ============================================================
// 状態管理
// ============================================================
var curSecId = 1;
var curMode = 'intro';
var orderMode = 'seq';

var im = { secId:null, data:null, idx:0 };
var ss = { secId:null, data:null, qs:[], idx:0, answered:false, correct:0, wrong:0, chosen:[] };
var sm = { secId:null, data:null, num:'', name:'', started:false, idx:0, answered:false, answers:{}, chosen:[], qs:[] };

function curDef(){ return SECDEFS.find(function(s){return s.id===curSecId;}); }

function doMath(el){
  // KaTeXは k() で都度レンダリング済みのHTML文字列を挿入しているため、ここでは何もしない
}

// ============================================================
// タブ・モード
// ============================================================
function buildTabs(){
  $('tabs').innerHTML = SECDEFS.map(function(s){
    return '<div class="tab '+(s.id===curSecId?'active':'')+'" onclick="setSec('+s.id+')">'+s.label+'</div>';
  }).join('');
}
function setSec(id){
  curSecId = id;
  im.secId = null; ss.secId = null; sm.started = false;
  buildTabs();
  render();
}
function setMode(mode){
  curMode = mode;
  $('modeIntro').classList.toggle('active', mode==='intro');
  $('modeStudy').classList.toggle('active', mode==='study');
  $('modeSubmit').classList.toggle('active', mode==='submit');
  render();
}

function render(){
  var def = curDef();
  $('hdrSub').textContent = def.subtitle;
  if (curMode==='intro') renderIntro(def);
  else if (curMode==='study') renderStudy(def);
  else renderSubmit(def);
}

// ============================================================
// 初学モード：選択肢なし、解答・解説をはじめから表示
// ============================================================
function renderIntro(def){
  if (im.secId !== def.id) {
    im.secId = def.id; im.idx = 0;
    im.data = buildQuestions(def.fric, def.sub, newParams(def.fric, def.sub));
  }
  setFigure(im.data.figure, im.data.surfLabel, def.fric);

  if (im.idx >= im.data.questions.length) { renderIntroDone(def); return; }
  var q = im.data.questions[im.idx], total = im.data.questions.length, pct = Math.round((im.idx/total)*100);

  $('content').innerHTML =
    '<div class="setup">'+im.data.setup+'</div>'+
    '<div class="prog-row"><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div><div class="prog-text">'+(im.idx+1)+' / '+total+'</div></div>'+
    '<div class="q-card"><div class="q-num">問 '+q.id+'</div><div class="q-text">'+q.text+'</div></div>'+
    '<div class="intro-answer"><div class="intro-answer-label">✅ 解答</div><div class="intro-answer-text">'+k(q.choices[0])+'</div><div class="intro-expl">💡 '+q.explanation+'</div></div>'+
    '<button class="next-btn" onclick="nextIntroQ()">'+(im.idx+1<total?'次の問題 →':'✅ セクション修了 →')+'</button>';
}
function nextIntroQ(){ im.idx++; renderIntro(curDef()); }
function renderIntroDone(def){
  $('content').innerHTML =
    '<div class="done-card"><div class="done-icon">🎓</div>'+
    '<div class="done-title">'+def.label+'（'+def.subtitle+'）の学習が終わりました</div>'+
    '<div class="done-sub">全 4 問を確認しました。次は自習モードで理解度を確かめましょう。</div>'+
    '<div class="done-actions">'+
    '<button class="next-btn" onclick="restartIntro()">🔄 別の数値でもう一度読み直す</button>'+
    '<button class="next-btn" style="background:#059669;" onclick="setMode(\'study\')">📖 自習モードへ進む</button>'+
    '</div></div>';
}
function restartIntro(){
  im.data = buildQuestions(curDef().fric, curDef().sub, newParams(curDef().fric, curDef().sub));
  im.idx = 0;
  renderIntro(curDef());
}

// ============================================================
// 自習モード（4択・即時採点）
// ============================================================
function setOrderMode(mode){ orderMode=mode; ss.secId=null; render(); }
function startStudy(def){
  ss.secId = def.id;
  ss.data = buildQuestions(def.fric, def.sub, newParams(def.fric, def.sub));
  ss.qs = orderMode==='rand' ? shuffle(ss.data.questions) : ss.data.questions.slice();
  ss.idx=0; ss.answered=false; ss.correct=0; ss.wrong=0; ss.chosen=[];
  renderStudy(def);
}
function renderStudy(def){
  if (ss.secId !== def.id || !ss.data) { startStudy(def); return; }
  setFigure(ss.data.figure, ss.data.surfLabel, def.fric);
  if (ss.idx >= ss.qs.length) { renderResult(def); return; }

  var q=ss.qs[ss.idx], total=ss.qs.length, pct=Math.round((ss.idx/total)*100);
  if (ss.chosen.length===0) ss.chosen = shuffle(q.choices.map(function(_,i){return i;}));

  $('content').innerHTML =
    '<div class="setup">'+ss.data.setup+'</div>'+
    '<div class="order-row"><span class="order-label">出題順：</span>'+
    '<button class="order-btn '+(orderMode==='seq'?'active':'')+'" onclick="setOrderMode(\'seq\')">学習順</button>'+
    '<button class="order-btn '+(orderMode==='rand'?'active':'')+'" onclick="setOrderMode(\'rand\')">ランダム</button></div>'+
    '<div class="prog-row"><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div><div class="prog-text">'+(ss.idx+1)+' / '+total+'</div></div>'+
    '<div class="score-row" id="scoreRow">✅ '+ss.correct+' &nbsp;❌ '+ss.wrong+'</div>'+
    '<div class="q-card"><div class="q-num">問 '+q.id+'</div><div class="q-text">'+q.text+'</div></div>'+
    '<div class="choices" id="clist">'+ss.chosen.map(function(ci,pos){
      return '<button class="choice-btn" id="cb'+pos+'" onclick="pick('+pos+')">'+k(q.choices[ci])+'</button>';
    }).join('')+'</div>'+
    '<div class="feedback" id="fb"></div>'+
    '<button class="next-btn" id="nb" onclick="nextQ()" style="display:none;">'+(ss.idx+1<total?'次の問題 →':'結果を見る →')+'</button>';
}
function pick(pos){
  if (ss.answered) return;
  ss.answered = true;
  var q = ss.qs[ss.idx];
  var isCorrect = ss.chosen[pos]===0;
  if (isCorrect) ss.correct++; else ss.wrong++;
  ss.chosen.forEach(function(ci,p){
    var btn=$('cb'+p); if(!btn) return; btn.disabled=true;
    if(ci===0) btn.classList.add('correct'); else if(p===pos) btn.classList.add('wrong');
  });
  var fb=$('fb');
  if (isCorrect){ fb.className='feedback ok'; fb.innerHTML='✅ 正解です！<span class="fb-expl">💡 '+q.explanation+'</span>'; }
  else { fb.className='feedback ng'; fb.innerHTML='❌ 不正解。正解は「'+k(q.choices[0])+'」です。<span class="fb-expl">💡 '+q.explanation+'</span>'; }
  $('scoreRow').innerHTML='✅ '+ss.correct+' &nbsp;❌ '+ss.wrong;
  $('nb').style.display='block';
}
function nextQ(){ ss.idx++; ss.answered=false; ss.chosen=[]; renderStudy(curDef()); }
function renderResult(def){
  var total=ss.qs.length, c=ss.correct, pct=Math.round((c/total)*100);
  var emoji = pct>=90?'🎉':pct>=70?'👍':pct>=50?'🤔':'😢';
  $('content').innerHTML =
    '<div class="result-card"><div class="result-emoji">'+emoji+'</div>'+
    '<div class="result-score">'+c+'</div><div class="result-total">/ '+total+' 問正解</div>'+
    '<div class="result-pct">正答率 '+pct+'%</div>'+
    '<div class="result-actions"><button class="retry-btn" onclick="startStudy(curDef())">🔄 別の数値でもう一度</button></div></div>';
}

// ============================================================
// 学習記録モード（組・氏名を入力し、送信）
// ============================================================
function renderSubmit(def){
  if (sm.secId !== def.id || !sm.started) { renderSubmitIntro(def); return; }
  setFigure(sm.data.figure, sm.data.surfLabel, def.fric);
  if (sm.idx >= sm.qs.length) { renderSubmitFinal(def); return; }
  renderSubmitQuestion(def);
}
function renderSubmitIntro(def){
  $('content').innerHTML =
    '<div class="name-card"><label class="name-label" for="snum">組番号を入力してください</label>'+
    '<input type="number" class="name-input" id="snum" placeholder="例：801〜940" min="801" max="940" value="'+(sm.secId===def.id?sm.num:'')+'"></div>'+
    '<div class="name-card"><label class="name-label" for="sname">氏名を入力してください</label>'+
    '<input type="text" class="name-input" id="sname" placeholder="例：湘南 太郎" value="'+(sm.secId===def.id?sm.name:'')+'"></div>'+
    '<button class="sm-start-btn" onclick="startSubmitQuiz('+def.id+')">✏️ 回答を開始する（全 4 問）</button>';
}
function startSubmitQuiz(secId){
  var num=$('snum').value.trim(), name=$('sname').value.trim();
  if (!num) { alert('組番号を入力してください。'); return; }
  if (!name) { alert('氏名を入力してください。'); return; }
  var def = SECDEFS.find(function(s){return s.id===secId;});
  sm.secId=secId; sm.num=num; sm.name=name; sm.started=true; sm.idx=0; sm.answered=false; sm.answers={}; sm.chosen=[];
  sm.data = buildQuestions(def.fric, def.sub, newParams(def.fric, def.sub));
  sm.qs = sm.data.questions.slice();
  renderSubmit(def);
}
function renderSubmitQuestion(def){
  var q=sm.qs[sm.idx], total=sm.qs.length, pct=Math.round((sm.idx/total)*100);
  if (sm.chosen.length===0) sm.chosen = shuffle(q.choices.map(function(_,i){return i;}));
  var selectedCi = sm.answers[q.id];

  $('content').innerHTML =
    '<div class="setup">'+sm.data.setup+'</div>'+
    '<div class="prog-row"><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div><div class="prog-text">'+(sm.idx+1)+' / '+total+'</div></div>'+
    '<div class="q-card"><div class="q-num">問 '+q.id+'</div><div class="q-text">'+q.text+'</div></div>'+
    '<div class="choices">'+sm.chosen.map(function(ci,pos){
      var cls='';
      if (sm.answered){ if(ci===0) cls='correct'; else if(ci===selectedCi && ci!==0) cls='wrong'; }
      return '<button class="choice-btn '+cls+'" id="smcb'+pos+'" onclick="pickSubmit('+pos+')" '+(sm.answered?'disabled':'')+'>'+k(q.choices[ci])+'</button>';
    }).join('')+'</div>'+
    (sm.answered ?
      '<div class="sm-explanation"><span class="sm-expl-icon">💡</span><span>'+q.explanation+'</span></div>'+
      '<button class="next-btn" onclick="nextSubmitQ()">'+(sm.idx+1<total?'次の問題 →':'✅ 送信画面へ →')+'</button>'
      : '');
}
function pickSubmit(pos){
  if (sm.answered) return;
  sm.answered = true;
  var q = sm.qs[sm.idx];
  sm.answers[q.id] = sm.chosen[pos];
  renderSubmitQuestion(curDef());
}
function nextSubmitQ(){ sm.idx++; sm.answered=false; sm.chosen=[]; renderSubmit(curDef()); }

function renderSubmitFinal(def){
  $('content').innerHTML =
    '<div class="sm-final-card"><div class="sm-final-icon">📝</div>'+
    '<div class="sm-final-title">全 '+sm.qs.length+' 問の回答が完了しました</div>'+
    '<div class="sm-final-name">'+sm.name+' さん</div>'+
    '<button class="submit-btn" id="sbtn" onclick="doSubmit('+def.id+')">📤 回答を送信する</button>'+
    '<div id="sresult"></div></div>';
}

// ★ デプロイ後、GASウェブアプリの exec URL をここに設定してください
// （同梱の gas_upload_code.gs を対象スプレッドシートに貼り付けてデプロイ）
const GAS_URL = 'https://script.google.com/macros/s/AKfycby5SoOFfOS7XxIwE5Q1ZS7cpOld4xkq7J0LS1Ycn6j_rFw6Ce0TMQOhHrK__pV4REVfHQ/exec';

var _gasParams=null, _gasMeta=null;
function doSubmit(secId){
  var def = SECDEFS.find(function(s){return s.id===secId;});
  var correct=0;
  sm.qs.forEach(function(q){ if (sm.answers[q.id]===0) correct++; });
  _gasMeta = { num: sm.num, name: sm.name, correct: correct, total: sm.qs.length };

  if (!GAS_URL){
    $('sresult').innerHTML =
      '<div class="sub-result warn">⚠️ 送信先が未設定です。<br>'+
      '<strong>'+sm.num+'　'+sm.name+'</strong> さんの得点：<strong>'+correct+' / '+sm.qs.length+'</strong><br>'+
      'GAS URL の設定後に送信できるようになります。</div>'+
      '<div style="display:flex;flex-direction:column;gap:10px;margin-top:12px;">'+
      '<button class="next-btn" onclick="setMode(\'study\')">📖 自習モードで学習する</button></div>';
    return;
  }

  _gasParams = new URLSearchParams({
    num: sm.num, name: sm.name, section: def.label,
    correct: String(correct), total: String(sm.qs.length),
    timestamp: new Date().toLocaleString('ja-JP')
  });
  sm.qs.forEach(function(q){ _gasParams.append('q'+q.id, sm.answers[q.id]===0 ? '○' : '×'); });

  var btn = $('sbtn'); btn.disabled=true; btn.textContent='📤 送信中…';
  trySend(btn, 1);
}
async function trySend(btn, attempt){
  var MAX_RETRY = 3;
  try {
    if (btn) btn.textContent = attempt===1 ? '📤 送信中…' : ('🔄 再送信中… ('+attempt+'/'+MAX_RETRY+')');
    await fetch(GAS_URL+'?'+_gasParams, { method:'GET', mode:'no-cors' });
    var num=_gasMeta.num, name=_gasMeta.name, correct=_gasMeta.correct, total=_gasMeta.total;
    $('sresult').innerHTML =
      '<div class="sub-result ok">✅ 送信完了しました。お疲れ様でした！<br>'+
      '<strong>'+num+'　'+name+'</strong> さんの得点：<strong>'+correct+' / '+total+'</strong></div>'+
      '<div style="display:flex;flex-direction:column;gap:10px;margin-top:12px;">'+
      '<button class="next-btn" onclick="setMode(\'study\')">📖 自習モードで学習する</button>'+
      '<button class="next-btn" style="background:#059669;" onclick="sm.started=false; setMode(\'submit\')">📤 学習記録モードでもう一度</button>'+
      '</div>';
  } catch(e){
    if (attempt < MAX_RETRY){ await new Promise(function(r){setTimeout(r,2000);}); await trySend(btn, attempt+1); }
    else {
      var num=_gasMeta.num, name=_gasMeta.name, correct=_gasMeta.correct, total=_gasMeta.total;
      $('sresult').innerHTML =
        '<div class="sub-result warn">❌ 送信に失敗しました。ネットワークを確認してもう一度お試しください。<br>'+
        '<strong>'+num+'　'+name+'</strong> さんの得点：<strong>'+correct+' / '+total+'</strong></div>';
      if (btn){ btn.disabled=false; btn.textContent='📤 もう一度送信する'; }
    }
  }
}

  var d='';
  for (var x=26; x<=476; x+=14) d += 'M'+x+' 232 l7 -5 l7 5 ';

}());

window.appInit = function(){ buildTabs(); render(); };
if (document.readyState==='complete' || typeof katex !== 'undefined') {
  buildTabs(); render();
} else {
  window.addEventListener('load', function(){ if (typeof katex==='undefined'){ buildTabs(); render(); } });
}
